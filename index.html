<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TailorLearn – AI Tutor</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; background:#0f172a; color:#e5e7eb; margin:0; }
  .wrap { max-width: 920px; margin: 24px auto; padding: 16px; display:none; }
  .card { background:#020617; border:1px solid #1f2937; border-radius:14px; padding:16px; margin-bottom:16px; }
  h1,h2 { margin: 0 0 10px; }
  label { font-size: 12px; color:#9ca3af; }
  input, select, textarea, button {
    width:100%; padding:12px; margin-top:8px; border-radius:10px;
    border:1px solid #1f2937; background:#020617; color:#e5e7eb;
  }
  button.primary { background:#2563eb; border:none; color:white; font-weight:bold; cursor:pointer; }
  button.ghost { background:#020617; }
  .row { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:8px; }
  .chat { background:#020617; border:1px solid #1f2937; border-radius:14px; padding:12px; height:360px; overflow:auto; }
  .msg { margin:10px 0; }
  .ai { color:#93c5fd; }
  .user { color:#a7f3d0; text-align:right; }
  .pill { display:inline-block; padding:6px 10px; border-radius:999px; background:#020617; border:1px solid #1f2937; margin-right:6px; font-size:12px;}
  .footer { color:#6b7280; font-size:12px; margin-top:8px; }
</style>
</head>
<body>

<div id="landing" style="min-height:100vh;background:linear-gradient(135deg,#020617,#020617 40%,#1e3a8a);display:flex;align-items:center;justify-content:center;padding:24px;">
  <div style="max-width:900px;text-align:center;">
    <h1 style="font-size:2.2rem;margin-bottom:12px;">
      Your Personal AI Tutor.<br/>Courses Made Just For You.
    </h1>
    <p style="font-size:1.1rem;color:#c7d2fe;margin-bottom:20px;">
      Interactive, personalized learning powered by real AI.
    </p>
    <button onclick="startLearning()" style="background:#2563eb;color:white;padding:14px 24px;font-size:16px;border:none;border-radius:12px;cursor:pointer;max-width:260px;width:100%;">
      🚀 Start Learning Free
    </button>
  </div>
</div>

<div class="wrap" id="app">

  <div class="card">
    <h1>🎓 TailorLearn — Real AI Tutor</h1>
    <div class="row">
      <div>
        <label>Topic</label>
        <input id="topic" placeholder="e.g., React, Python, Kubernetes" />
      </div>
      <div>
        <label>Level</label>
        <select id="level">
          <option>Beginner</option>
          <option>Intermediate</option>
          <option>Advanced</option>
        </select>
      </div>
      <div>
        <label>Goal</label>
        <input id="goal" placeholder="Interview / Project / Exam" />
      </div>
      <div>
        <label>Language</label>
        <select id="lang">
          <option>English</option>
          <option>English + Hindi</option>
        </select>
      </div>
    </div>
    <button class="primary" onclick="start()">Create My Course</button>
  </div>

  <div class="card">
    <h2>Live Lesson</h2>
    <div id="chat" class="chat"></div>
    <div class="row">
      <textarea id="input" rows="2" placeholder="Ask a doubt or answer the tutor…"></textarea>
      <button class="ghost" onclick="send()">Send</button>
    </div>
  </div>

</div>

<script>
let state = { started:false };
let currentLesson = "";

function addMsg(text, who='ai') {
  const chat = document.getElementById("chat");
  const d = document.createElement('div');
  d.className = 'msg ' + (who==='ai'?'ai':'user');
  d.innerHTML = text.replace(/\n/g,'<br/>');
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

function startLearning() {
  document.getElementById("landing").style.display = "none";
  document.getElementById("app").style.display = "block";
}

function start() {
  state.started = true;
  const t = topic.value || "the selected topic";
  const l = level.value;
  const g = goal.value || "your goal";

  addMsg(`👋 Hi! I’m your AI tutor.
We’ll learn ${t} at ${l} level, focused on ${g}.
Tell me what you already know about this topic.`);
}

async function send() {
  if(!state.started) return;

  const inputBox = document.getElementById("input");
  const message = inputBox.value.trim();
  if(!message) return;

  addMsg(message,'user');
  inputBox.value = '';

  addMsg("⏳ Thinking...", "ai");

  try {
    const response = await fetch("https://tailorlearn-backend.onrender.com/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: message,
        topic: topic.value,
        level: level.value,
        goal: goal.value,
        language: lang.value
      })
    });

    const data = await response.json();

    document.getElementById("chat").lastChild.remove();

    addMsg(data.reply, "ai");
    currentLesson = data.reply;

  } catch (error) {
    document.getElementById("chat").lastChild.remove();
    addMsg("❌ Failed to connect to AI server.", "ai");
  }
}
</script>

</body>
</html>
