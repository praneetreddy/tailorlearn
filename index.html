<!-- Dedicated Voice Interaction Section -->
<div id="voice-only-mode" style="display:none; min-height:100vh; background:#0f172a; color:#e5e7eb; padding:24px; text-align:center; position:relative;">
  <img src="https://i.ibb.co/3N1R9qJ/ai-avatar.png" alt="AI Tutor"
       style="width:150px;height:150px;border-radius:50%;border:3px solid #2563eb;margin-bottom:12px;">
  
  <h2>🎤 Talk to Your AI Tutor</h2>
  <p style="color:#c7d2fe;">Speak naturally and I’ll respond in real-time. Refer to steps below if needed.</p>

  <div id="voice-chat" class="chat" style="height:400px; overflow:auto; margin-top:12px;"></div>

  <button class="primary" onclick="startVoiceOnly()" style="margin-top:16px; padding:12px 24px; font-size:16px;">
    🎤 Start Talking
  </button>

  <button class="ghost" onclick="exitVoiceMode()" style="position:absolute; top:16px; right:16px;">
    ❌ Exit
  </button>
</div>

<script>
let voiceOnlyState = { active:false };

// Open voice-only mode
function openVoiceMode() {
  document.getElementById("app").style.display = "none";
  document.getElementById("voice-only-mode").style.display = "block";
  voiceOnlyState.active = true;
}

// Exit voice-only mode
function exitVoiceMode() {
  document.getElementById("voice-only-mode").style.display = "none";
  document.getElementById("app").style.display = "block";
  voiceOnlyState.active = false;
  if(recognition) recognition.stop();
}

// Start continuous voice interaction
async function startVoiceOnly() {
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
    alert("Voice input not supported on this browser");
    return;
  }

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.lang = "en-IN";
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  addVoiceOnlyMsg("🎤 Listening... Speak now", "ai");
  recognition.start();

  recognition.onresult = async function(event) {
    const voiceText = event.results[0][0].transcript;
    addVoiceOnlyMsg(voiceText, "user");

    try {
      const res = await fetch("https://tailorlearn-backend.onrender.com/chat", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ message: voiceText, interview: state.interview })
      });
      const data = await res.json();
      addVoiceOnlyMsg(data.reply, "ai");
      speakText(data.reply);
    } catch(e) {
      addVoiceOnlyMsg("❌ Failed to connect to AI server.","ai");
    }

    if(voiceOnlyState.active) recognition.start(); // restart listening for continuous conversation
  };

  recognition.onerror = function() {
    addVoiceOnlyMsg("❌ Could not hear you clearly. Retrying...","ai");
    if(voiceOnlyState.active) recognition.start();
  };
}

// Add messages in voice-only mode
function addVoiceOnlyMsg(text, who='ai') {
  const chat = document.getElementById("voice-chat");
  const d = document.createElement('div');
  d.className = 'msg ' + (who==='ai'?'ai':'user');
  d.innerHTML = text.replace(/\n/g,'<br/>');
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

// Add a button in main app to open voice-only mode
const voiceBtn = document.createElement('button');
voiceBtn.innerText = '🎤 Talk to AI';
voiceBtn.className = 'primary';
voiceBtn.style.marginTop = '12px';
voiceBtn.onclick = openVoiceMode;
document.getElementById("app").prepend(voiceBtn);
</script>
