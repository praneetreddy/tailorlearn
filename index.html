<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mentoro AI Tutor</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { font-family: system-ui; background:#0f172a; color:#e5e7eb; margin:0; }
  .wrap { max-width:920px; margin:24px auto; padding:16px; display:none; }
  .card { background:#020617; border:1px solid #1f2937; border-radius:14px; padding:16px; margin-bottom:16px; }
  h1,h2 { margin:0 0 10px; }
  input, select, textarea, button { width:100%; padding:12px; margin-top:8px; border-radius:10px; border:1px solid #1f2937; background:#020617; color:#e5e7eb; }
  button.primary { background:#2563eb; border:none; color:white; font-weight:bold; cursor:pointer; }
  .chat { background:#020617; border:1px solid #1f2937; border-radius:14px; padding:12px; height:360px; overflow:auto; }
  .msg.ai { color:#93c5fd; }
  .msg.user { color:#a7f3d0; text-align:right; }
  .pill { display:inline-block; padding:6px 10px; border-radius:999px; background:#020617; border:1px solid #1f2937; margin-right:6px; font-size:12px;}
</style>
</head>
<body>

<!-- Landing -->
<div id="landing" style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; background:linear-gradient(135deg,#020617,#1e3a8a);">
  <div style="max-width:900px;text-align:center;">
    <h1>Your Personal AI Tutor</h1>
    <p>Tell us what you want to learn. I create interactive lessons in real-time.</p>
    <button onclick="startLearning()" class="primary" style="max-width:260px;">🚀 Start Learning Free</button>
  </div>
</div>

<!-- Main App -->
<div class="wrap" id="app">

  <button class="primary" onclick="openVoiceMode()">🎤 Talk to AI</button>

  <div class="card">
    <h1>🎓 TailorLearn — Interactive AI Tutor</h1>
    <div class="row">
      <div><label>Topic</label><input id="topic" placeholder="e.g., React, Python"/></div>
      <div><label>Level</label><select id="level"><option>Beginner</option><option>Intermediate</option><option>Advanced</option></select></div>
      <div><label>Goal</label><input id="goal" placeholder="Interview / Project"/></div>
      <div><label>Language</label><select id="lang"><option>English</option><option>English + Hindi</option></select></div>
    </div>
    <button class="primary" onclick="startCourse()">Create My Course</button>
  </div>

  <!-- Chat Section -->
  <div class="card">
    <h2>Live Lesson</h2>
    <div id="chat" class="chat"></div>
    <div class="row">
      <textarea id="input" rows="2" placeholder="Ask a doubt…"></textarea>
      <button onclick="sendMessage()">Send</button>
      <button onclick="startVoice()">🎤 Speak</button>
    </div>
  </div>

</div>

<!-- Voice-only Video AI Mode -->
<div id="voice-only-mode" style="display:none; min-height:100vh; background:#0f172a; color:#e5e7eb; padding:24px; text-align:center;">
  <video id="ai-video-player" width="320" height="240" autoplay muted style="border-radius:12px;"></video>
  <div id="ai-video-text" style="margin-top:12px; color:#c7d2fe;"></div>
  <button onclick="exitVoiceMode()" style="margin-top:12px;">❌ Exit</button>
</div>

<script>
let state={started:false, depth:0};
let currentLesson="";
let recognition;

// --- Landing ---
function startLearning(){
  document.getElementById("landing").style.display="none";
  document.getElementById("app").style.display="block";
}

// --- Course ---
function startCourse(){
  state.started=true;
  state.depth=0;
  document.getElementById("chat").innerHTML='';
  const t=topic.value||'your topic';
  const l=level.value;
  const g=goal.value||'your goal';
  addMsg(`👋 Hi! I’m your AI tutor.<br/>We’ll learn <b>${t}</b> at <b>${l}</b> level, focused on <b>${g}</b>. What do you know about this?`, "ai");
}

// --- Chat ---
function addMsg(text, who='ai'){
  const d=document.createElement('div');
  d.className='msg '+(who==='ai'?'ai':'user');
  d.innerHTML=text.replace(/\n/g,'<br/>');
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
}

async function sendMessage(){
  const v=input.value.trim();
  if(!v) return;
  addMsg(v,'user');
  input.value='';

  try{
    const res=await fetch("https://tailorlearn-backend.onrender.com/chat", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ message:v, interview:goal.value.toLowerCase().includes('interview') })
    });
    const data=await res.json();
    addMsg(data.reply,'ai');
    currentLesson=data.reply;
  } catch(e){
    addMsg("❌ Failed to connect to AI server.","ai");
  }
}

// --- Voice recognition ---
function startVoice(){
  if(!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)){ alert("Voice not supported"); return; }
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition=new SpeechRecognition();
  recognition.lang="en-IN"; recognition.interimResults=false; recognition.maxAlternatives=1;
  addMsg("🎤 Listening... Speak now","ai");
  recognition.start();
  recognition.onresult = function(event){
    input.value=event.results[0][0].transcript;
    sendMessage();
  }
  recognition.onerror=function(){ addMsg("❌ Could not hear you clearly.","ai"); }
}

// --- Voice-only AI Mode ---
function openVoiceMode(){
  document.getElementById("app").style.display="none";
  document.getElementById("voice-only-mode").style.display="block";
  startContinuousVoiceAI();
}

function exitVoiceMode(){
  document.getElementById("voice-only-mode").style.display="none";
  document.getElementById("app").style.display="block";
  if(recognition) recognition.stop();
}

async function startContinuousVoiceAI(){
  if(!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)){ alert("Voice not supported"); return; }
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition=new SpeechRecognition();
  recognition.lang="en-IN"; recognition.interimResults=false; recognition.maxAlternatives=1;

  addVoiceMsg("🎤 Listening... Speak now","ai");
  recognition.start();

  recognition.onresult = async function(event){
    const voiceText = event.results[0][0].transcript;
    addVoiceMsg(voiceText,'user');

    try{
      const chatRes=await fetch("https://tailorlearn-backend.onrender.com/chat", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ message: voiceText })
      });
      const chatData = await chatRes.json();
      addVoiceMsg(chatData.reply,"ai");

      // Send to D-ID video
      const videoRes=await fetch("https://tailorlearn-backend.onrender.com/talk-video", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ text: chatData.reply, avatar:"male" })
      });
      const videoData = await videoRes.json();
      const video=document.getElementById("ai-video-player");
      video.src=videoData.videoUrl;
      document.getElementById("ai-video-text").innerText=chatData.reply;

    } catch(e){
      addVoiceMsg("❌ Failed to connect to AI server.","ai");
    }

    if(voiceOnlyModeActive) recognition.start();
  };

  recognition.onerror=function(){ addVoiceMsg("❌ Could not hear you. Retrying...","ai"); if(voiceOnlyModeActive) recognition.start(); }
}

function addVoiceMsg(text,who='ai'){
  const chatDiv=document.getElementById("ai-video-text");
  chatDiv.innerHTML+="<div style='margin:6px 0; color:"+(who==='ai'?'#93c5fd':'#a7f3d0')+"'>"+text+"</div>";
}

let voiceOnlyModeActive = true;
</script>
</body>
</html>
