<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TailorLearn – Talk to AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; background:#0f172a; color:#e5e7eb; margin:0; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; }
  #talk-section { display:none; flex-direction:column; align-items:center; gap:16px; }
  #avatar { width:180px; height:180px; border-radius:50%; border:3px solid #2563eb; }
  #video { width:320px; height:240px; border-radius:12px; background:#000; }
  button { padding:12px 24px; border:none; border-radius:10px; background:#2563eb; color:white; font-weight:bold; cursor:pointer; }
  textarea { width:320px; height:80px; border-radius:10px; padding:8px; border:1px solid #1f2937; background:#020617; color:#e5e7eb; resize:none; margin-top:8px; }
  #loading { color:#facc15; display:none; font-weight:bold; }
</style>
</head>
<body>

<button id="start-btn">🎤 Talk to AI</button>

<div id="talk-section">
  <img id="avatar" src="https://i.ibb.co/3N1R9qJ/ai-avatar.png" alt="AI Avatar">
  <div id="loading">Generating AI Response...</div>
  <video id="video" controls autoplay></video>
  <textarea id="response-text" placeholder="AI steps / messages will appear here..." readonly></textarea>
</div>

<script>
const startBtn = document.getElementById('start-btn');
const talkSection = document.getElementById('talk-section');
const video = document.getElementById('video');
const responseText = document.getElementById('response-text');
const loading = document.getElementById('loading');

// Backend URL
const BACKEND_URL = "https://tailorlearn-backend.onrender.com";

startBtn.onclick = async () => {
  startBtn.style.display = 'none';
  talkSection.style.display = 'flex';

  const message = "Hi! I am your AI tutor. Let's talk.";
  const presenter = "v2_public_Amber@0zSz8kflCN"; // female avatar

  // Speak via TTS while video is generating
  const utterance = new SpeechSynthesisUtterance(message);
  utterance.lang = "en-US";
  speechSynthesis.speak(utterance);

  try {
    loading.style.display = 'block';

    // Send request to create AI video
    const res = await fetch(`${BACKEND_URL}/talk-video`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message, presenter })
    });
    const data = await res.json();
    const clipId = data.clip_id;

    // Poll until video is ready
    let status = '';
    let videoUrl = '';
    while(status !== 'succeeded') {
      await new Promise(r => setTimeout(r, 3000)); // wait 3s
      const poll = await fetch(`${BACKEND_URL}/clip/${clipId}`);
      const pollData = await poll.json();
      status = pollData.status;
      videoUrl = pollData.url || '';
    }

    loading.style.display = 'none';
    video.src = videoUrl;
    responseText.value = message;

  } catch(err) {
    loading.style.display = 'none';
    responseText.value = '❌ AI video generation failed';
    console.error(err);
  }
};
</script>
</body>
</html>
