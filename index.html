<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TailorLearn – AI Tutor</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { font-family: system-ui; background:#0f172a; color:#e5e7eb; margin:0; padding:0; }
  #talkSection { display:none; text-align:center; padding:20px; }
  #avatar { width:150px; border-radius:50%; border:3px solid #2563eb; margin-bottom:12px; }
  #video { width:320px; margin-top:12px; border-radius:14px; border:1px solid #1f2937; }
  button { padding:12px 20px; border-radius:12px; border:none; background:#2563eb; color:white; cursor:pointer; margin-top:8px; }
</style>
</head>
<body>

<div id="landing" style="text-align:center; padding:40px;">
  <h1>🎓 TailorLearn AI Tutor</h1>
  <button onclick="openTalk()">Talk to AI</button>
</div>

<div id="talkSection">
  <img id="avatar" src="https://i.ibb.co/3N1R9qJ/ai-avatar.png" alt="AI Avatar">
  <div id="status">👋 Hi! Waiting for AI...</div>
  <video id="video" controls autoplay></video>
  <textarea id="message" rows="2" style="width:80%; margin-top:8px;">Hello! I am your AI tutor.</textarea>
  <br>
  <button onclick="generateVideo()">Speak</button>
</div>

<script>
const backend = "https://tailorlearn-backend.onrender.com";
const presenterId = "v2_public_Adam@0GLJgELXjc"; // male presenter

function openTalk(){
  document.getElementById("landing").style.display = "none";
  document.getElementById("talkSection").style.display = "block";
  speakText("Hi! I am your AI tutor."); // optional TTS while waiting
}

// TTS fallback
function speakText(text){
  if('speechSynthesis' in window){
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "en-US"; u.rate = 1;
    speechSynthesis.speak(u);
  }
}

// Generate AI video
async function generateVideo(){
  const msg = document.getElementById("message").value;
  document.getElementById("status").innerText = "🎬 Preparing AI video...";

  try {
    const res = await fetch(`${backend}/talk-video`, {
      method:"POST",
      headers: { "Content-Type":"application/json" },
      body: JSON.stringify({ message: msg, presenter: presenterId })
    });
    const data = await res.json();
    const clipId = data.clip_id;

    // Polling clip status
    let url = null;
    while(true){
      const statusRes = await fetch(`${backend}/clip/${clipId}`);
      const statusData = await statusRes.json();
      if(statusData.status === "succeeded"){
        url = statusData.url;
        break;
      } else if(statusData.status === "failed"){
        throw new Error("AI video generation failed");
      }
      await new Promise(r => setTimeout(r, 2000)); // wait 2 sec
    }

    document.getElementById("status").innerText = "✅ Video ready!";
    const videoEl = document.getElementById("video");
    videoEl.src = url;

  } catch(e){
    console.error(e);
    document.getElementById("status").innerText = "❌ AI video failed. Playing TTS instead.";
    speakText(msg);
  }
}
</script>

</body>
</html>
